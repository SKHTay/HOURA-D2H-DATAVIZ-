<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2H - Roue d'analyse croisee</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ibm-plex/6.4.1/css/ibm-plex.min.css">
<style>
:root{
  --ink:#161616; --paper:#ffffff; --bg:#faf9f6; --dim:#6b6b6b; --line:#e2ded4;
  --benchmark-bg:#f7e4d3; --benchmark-accent:#d9772f;
  --litterature-bg:#f3e2ea; --litterature-accent:#b8558f;
  --entretiens-bg:#e6ecdf; --entretiens-accent:#6f8c52;
  --enquete-bg:#dbe7e5;    --enquete-accent:#3f7d7d;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
.wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
@media(max-width:1050px){.wrap{grid-template-columns:1fr;}}

/* LEFT : wheel */
.stage{position:relative;padding:28px 24px;display:flex;flex-direction:column;}
.masthead{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.04em;color:var(--dim);text-transform:uppercase;}
.masthead b{color:var(--ink);font-weight:600;}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0 6px;}
.legend span{font-family:'IBM Plex Mono',monospace;font-size:11px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:3px 8px;border-radius:999px;border:1px solid transparent;}
.legend span:hover{border-color:var(--line);}
.legend span.off{opacity:.32;}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block;}
.wheelbox{flex:1;display:flex;align-items:center;justify-content:center;}
svg{width:100%;height:auto;max-width:640px;}
.cell{cursor:pointer;transition:opacity .15s, transform .15s;stroke:var(--bg);stroke-width:1.2;}
.cell.empty{cursor:default;}
.cell:hover{opacity:.82;}
.seg-hit{fill:transparent;cursor:pointer;}
.lbl{font-family:'IBM Plex Sans',sans-serif;font-size:10.5px;fill:var(--ink);}
.lbl.weak{fill:var(--dim);font-style:italic;}
.lbl.sel{font-weight:700;}
.blocarc{fill:none;stroke-width:3;opacity:.55;}
.bloclbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;fill:var(--dim);text-transform:uppercase;}
.center-t{font-family:'IBM Plex Mono',monospace;fill:var(--ink);}
.center-s{font-family:'IBM Plex Sans',sans-serif;font-size:11px;fill:var(--dim);}
.hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);text-align:center;margin-top:4px;}

/* RIGHT : panel */
.panel{background:var(--paper);border-left:1px solid var(--line);padding:44px 46px;overflow-y:auto;max-height:100vh;}
.nav{display:flex;gap:22px;font-family:'IBM Plex Mono',monospace;font-size:12px;margin-bottom:26px;}
.nav a{color:var(--enquete-accent);cursor:pointer;text-decoration:none;}
.nav a:hover{text-decoration:underline;}
.nav a.mut{color:var(--dim);}
.p-bloc{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.p-title{font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:600;line-height:1.18;margin:0 0 20px;}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:26px;}
.chip{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:12px;padding:6px 13px;border-radius:999px;cursor:pointer;border:1px solid transparent;user-select:none;}
.chip.disabled{opacity:.35;cursor:not-allowed;text-decoration:line-through;}
.chip.off{background:var(--paper)!important;border-color:var(--line)!important;color:var(--dim)!important;}
.block{margin-bottom:26px;padding-left:16px;border-left:3px solid;}
.block .src{font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:baseline;gap:10px;margin-bottom:3px;}
.block .lvl{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:400;color:var(--dim);letter-spacing:0;text-transform:none;}
.block .txt{font-size:14.5px;line-height:1.65;white-space:pre-line;}
.empty-note{color:var(--dim);font-style:italic;font-size:13px;}
.contrib{font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--dim);margin-top:34px;padding-top:18px;border-top:1px solid var(--line);}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;left:20px;top:16px;z-index:50;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;color:#6b6b6b;text-decoration:none;">&larr; Retour a la narration</a>
<div class="wrap">
  <div class="stage">
    <div class="masthead"><b>DataHubHOURAA</b> / analyse croisee - 4 flux, 18 sous-themes</div>
    <div class="legend" id="legend"></div>
    <div class="wheelbox"><svg id="wheel" viewBox="0 0 760 760" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div class="hint">Cliquez un segment pour lire son contenu. Cliquez un anneau pour isoler un flux.</div>
  </div>
  <div class="panel" id="panel"></div>
</div>
<script>
const DATA = [{"col": "D", "theme": "Ambition stratégique / vision", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Synthèse des ambitions /finalité visée pour la donnée observées dans les cas de benchmark :\n- Mutualiser, harmoniser et standardiser les données (socle interopérable)\n- Mettre à disposition de façon sécurisée (environnement de confiance / accès régulé)\n- Faire progresser la recherche\n- Améliorer le soin, la qualité et la sécurité des patients\n- Bâtir un « système de santé apprenant » (boucle : données --> connaissance --> soin)\n- Piloter l'activité / efficience (médico-éco)\n- Prévention, détection précoce, santé des populations\n- Développer et déployer l'IA clinique\n- Orchestrer un réseau / devenir un hub (au-delà de ses propres données)\n- Valoriser économiquement (monétisation, spin-offs, partenariats industriels)\nVoir tableau en cellule C23 pour une analyse par structure\nGrands enseignements :\n1. Evolution des strategies : de « la donnée pour la recherche » vers « le système de santé apprenant ».\nCertaines initiatives (SPHN, MII, HDR UK à l'origine) sont centrées sur la recherche. Les ambitions les plus récentes élargissent au triptyque recherche + soin + pilotage : Charité (« learning healthcare system »), HUS (« knowledge-based management »), Erasmus (« bytes to bedside »).\n2. Deux postures stratégiques co-existent et certaines intiatives les combinent\nCertains se positionnent prioritairement en bâtisseurs d'infrastructure / enabler (SPHN, MII, HDR UK : « on construit le socle d'accès »), d'autres en transformateurs de la médecine (Sheba, Charité, HUS : « on réinvente le soin »). Erasmus se positionne sur les deux au même niveau\n3. Le sujet de la confiance et de la gouvernance peuvent être inclus dans l'ambition\nCertains acteurs intègre l'acceptabilité au cœur de leur vision : HDR UK fait de la transparence une priorité stratégique (« le verrou n'est pas la technique mais la gouvernance de l'accès »), SPHN pérennise une fonction ELSI, Mayo cadre une IA « fair, appropriate, valid, equitable and safe ».\n4. Certains acteurs incluent la dimensions économique dans leur vision :\nLa valeur économique entre dans l'ambition (Mayo monétise, Sheba vise la croissance économique, HDR UK avance l'argument économique, HUS attire la R&D industrielle).", "entretiens": "", "litterature": "ORIENTATION :\nAncrer la vision D2H sur des fardeaux de santé publique démontrés, non sur la tendance technologique :\n• vieillissement : 28 % de 60+ ans en 2025, cap des 35 % projeté en 2070 [Inst. INSEE 2024]\n• maladies chroniques : 62 % des dépenses d'Assurance Maladie [Inst. CNAM 2022]\n• RAM : projection jusqu'à 10 M décès/an en 2050 [PR Fernandez Salgueiro et al., EMR 2024]\nvers Donne un socle factuel à l'ambition exprimée en entretiens, souvent centrée recherche, en la reliant à un impact populationnel mesurable.", "enquete": "NATURE & NIVEAU DE PREUVE - Enquête interne déclarative (auto-évaluation), N = 2 509, 4 CHU. Donnée institutionnelle brute, non pondérée : échantillon dominé par les HCL (48,7 %) vers tout chiffre « global » est en réalité tiré vers le profil HCL. Ni preuve probante, ni benchmark. Source « compagnon » sur la seule dimension IA (ne couvre ni l'ambition, ni le modèle d'entrepôt de données de santé - EDS).\nFAIT FONDATEUR : l'adoption de l'IA est déjà réelle et ascendante - 46,1 % d'usage individuel déclaré. La politique commune Data & IA ne crée pas un besoin, elle rattrape un usage déjà installé, hors cadre."}}, {"col": "E", "theme": "Modèle de fonctionnement", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Le benchmark a permis d'identifier des grands modèles de fonctionnement qui se dégagent :\n1. L'harmonisateur fédéré public (MII, SPHN) - mutualise sans centraliser. Les données restent chez les membres ; la structure fournit le standard commun, l'accès régulé et la coordination. Pas de bras commercial, adossement national fort.\n2. L'animateur de réseau / chef d'orchestre (HDR UK, et le versant externe d'Erasmus) - ne détient pas les données, fixe les règles. Fournit standards, contrats-types, TRE ; rôle de tête de réseau.\n3. L'opérateur-intégrateur / valorisateur (HUS, Charité, versant interne d'Erasmus) - agrège et exploite un patrimoine de données qu'il opère. HUS le fait à l'échelle régionale (lac centralisé) ; la Charité à l'échelle d'un établissement. C'est le modèle le plus orienté « usage » (recherche + soin + pilotage).\n4. La plateforme commerciale / venture (Mayo, Sheba) - transforme la donnée en valeur économique. Mayo monétise l'accès (fédéré « Data Behind Glass ») ; Sheba construit des entreprises (venture-builder). Autofinancés, tournés vers l'export.\nEt a permis d'identifier 4 caractéristiques en lien avec la gouvernance et l'organisation :\n1. Instance/comité formalisé d'accès aux données\n2. Équipe de coordination dédiée et mutualisée\n3. Bras d'innovation / commercialisation dédié (spin-offs, venture)\n4. Fonction éthique-IA / ELSI permanente et nommée\nEnseignement :\n1. Les «Instance / comité formalisé d'accès aux données » et « équipe de coordination dédiée et mutualisée » sont présents (bien qu'à différentes échelles et modalités) chez tous les acteurs étudiés, ce sont les invariants de tous les modèles de fonctionnement\n2. La plupart des acteurs ne sont pas un modèle « pur » mais une combinaison de plusieurs : Erasmus cumule 2 et 3, HUS mêle 3 et un peu 4, etc. Le modèle réel est souvent un dosage, pas une case unique.\n3. Un des choix structurants du modèle reste le choix de l'architecture fédérée ou centralisée :\nLe benchmark offre deux exemples aboutis : fédéré (MII : chaque membre garde son EDS, accès via point commun) ou centralisé (HUS : un lac unique alimenté par tous les membres).\n4. Le rôle « animateur de réseau » est un positionnement à part entière\nHDR UK montre qu'on peut créer de la valeur sans opérer soi-même les données, juste en fixant standards, contrats-types et règles d'accès.", "entretiens": "", "litterature": "ORIENTATION (apport indirect):\nLa littérature documente la nécessité de modèles intégrés sanitaire-social et de données longitudinales multi-acteurs : système de soins plus fragmenté en 2020 qu'en 2010 [PR Bajeux et al., IJIC 2021].\nvers Appuie le choix d'un modèle fédéré interopérable.\nLa revue ne pointe pas le modèle organisationnel propre du GCS (relève des entretiens/benchmark).", "enquete": ""}}, {"col": "F", "theme": "Maturité des projets EDS / Data", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Le benchmark a identifié plusieurs caractéristiques permettant d'évaluer la maturité des EDS / projet data :\n1. Plateforme / infrastructure data nommée et opérationnelle\n2. Lac / entrepôt centralisé unique\n3. Architecture fédérée / distribuée\n4. Standardisation à un modèle de données commun\n5. Evironnement de traitement sécurisé / certifié (TRE)\n6. Données de soins de routine à grande ehcelle\n7. Données non-structurées / multi-modales (imagerie, signal génome, texte)\n8. Technologie de préservation de la vie privée\n9. Infrastructure réellement utilisée adoptée\nEnseignements :\n1. Dans la majorité des structure étudiées : une infrastructure de données + un environnement sécurisé d'accès (TRE).\n2. La standardisation à un modèle commun est le vrai socle de maturité\n3. La maturité « avancée » se mesure à la richesse des données, pas seulement à leur volume. Les plus matures intègrent l'imagerie, le signal, le génome et le texte (HUS, Charité, Mayo, Sheba), pas seulement des données structurées de facturation/diagnostic. C'est ce qui ouvre l'IA clinique de pointe.\n4. « Construit » ≠ « utilisé » : Un volet adoption (formation, animation) traité comme partie intégrante de la maturité ;", "entretiens": "La maturité des équipes et des établissements sur les enjeux associés aux données de santé se décline en 3 niveaux de réponse :\n- La maturité technologique fait apparaître des évolutions distinctes en termes d'équipement => CHUCF ne dispose pas à date de son EDS mais peut cependant s'appuyer sur des bases existantes comme celle du Groupe coopérateur en Oncologie (LYSA) ; le CHUGA dispose d'une antériorité d'usage car équipé d'un outil interne depuis 2019 ;\n- la maturité organisationnelle et RH se décline autour de la structuration des CHU autour de ces enjeux (Cf. Direction IA et Données aux HCL) ainsi que des ressources dédiées (Cf. équipe dédiée au CHUCF avec 4 biostatisticiens) ;\n- la maturité réglementaire n'est pas encore parfaitement atteinte du point de vue des répondants mais est doublement encouragée par les règles de la CNIL qui poussent vers l'usage des EDS et par les travaux de recherche qui défrichent les sujets de réglementation projet par projet.", "litterature": "PREUVE IMMATURE, pas forcément absente - distinguer deux niveaux :\n• IMPACT (clinique / recherche / santé publique) : partiellement démontrable, premiers cas d'usage émergents ; se renforcera avec le temps.\n• ROI économique : structurellement difficile à isoler (bénéfices diffus, indirects, à long terme vs coûts immédiats ; pas de contrefactuel) - rare même dans les écosystèmes matures (ex. benchmark MII Allemagne, actif depuis 2016).\nCAUSES PROBABLES DE CE VIDE :\n(1) RÉCENCE DES EDS : ~100 EDS autorisés CNIL au 01/01/2025 [Inst. CNIL] ; AAP EDS hospitaliers France 2030 lancés en 2023 [Inst.] ; la dimension partagée / multi-CHU est encore plus jeune.\n(2) HÉTÉROGÉNÉITÉ - la HAS qualifie l'écosystème d'« en pleine construction » et juge qu'il ne permet encore guère d'exploitation à l'échelle nationale [Inst. HAS, panorama EDSH 2022].\nvers L'interopérabilité « by design » c'est le prérequis qui rend l'évaluation d'impact multi-sites possible.\nvers La recommandation est de ne pas attendre la preuve mais la PRODUIRE : indicateurs d'impact et protocole d'évaluation embarqués dès le départ. Transforme l'angle mort en contribution scientifique de primo-arrivant (cf. E21).", "enquete": "⚠ Mesure la maturité IA déclarée - objet distinct de la maturité EDS / data (ne pas confondre). Niveau IA moyen : 2,11 / 5. Niveaux 1-2 « débutants » : 48,7 % ; niveaux 4-5 « experts » : 17,7 %. Corrélation (et non causalité) âge vers maturité : le niveau 1 passe de 26 % chez les 18-25 ans à 45 % chez les +56 ans. Photographie déclarative, biais d'auto-évaluation."}}, {"col": "G", "theme": "Usages recherche", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Panorama : les cas d'usage observés\nCas d'usage 1 : RECHERCHE (la finalité historique et universelle)\nRecherche observationnelle sur données de vie réelle (toutes)\nRecherche fédérée multi-sites / multi-pays sans déplacer les données (MII PrivateAIM, Erasmus EHDEN/DARWIN EU)\nProduction de preuves pour les régulateurs du médicament (Erasmus/DARWIN EU pour l'EMA) - pivot vers le pilotage public\nCohortes longitudinales et grandes études de population (Erasmus Generation R)\nRecherche génomique / multi-omique (Charité, HUS, Sheba/Mount Sinai-NVIDIA)\nDiagnostic des maladies rares (HUS eCare for Me/Rare3k, MII CORD_MI)\nEssais cliniques optimisés (recrutement, sélection) (Sheba/Paradigm, Mayo/Orchestrate)", "entretiens": "L'axe recherche est à la fois majeur et structurant pour les CHU car:\n- il s'agit du volet le plus avancé en termes de projets (effectifs et/ou à venir) impliquant les bases massives de données;\n- il englobe une grande diversité d'activités (pre-screening, inclusion, analyse, publication...) de profils (spécialités cliniques, biostatisticiens / data analysts, ARC...) et d'aires thérapeutiques;\n- c'est l'axe qui \"pousse\" le plus à l'approche fédérée (à l'échelle régionale d'abord, voire au-delà selon les spécialités ; cf.maladies rares);\n- bénéficie de financements variés bien que leur intensité reste dépendant des spécialités.\nL'apport des EDS pour les équipes de recherche cliniques est principalement quantitatif (avoir accès à des bases de données structurées plus importantes) mais peu parfois être également \"qualitatif\" (avoir accès à des populations spécifiques représentées dans les autres CHU du groupement).", "litterature": "APPUI - Domaines de recherche à fort rendement pour un EDS multi-CHU : cohortes gériatriques longitudinales ; cohortes ALD multi-pathologies inter-CHU ; surveillance RAM [PR + Inst.].\nvers Conforte l'usage recherché, mais oriente vers des objets à impact Santé Publique (parcours, populationnel) au-delà des seuls essais cliniques / inclusions.", "enquete": ""}}, {"col": "H", "theme": "Pilotage médico-économique", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Cas d'usage 2 : PILOTAGE / MÉDICO-ÉCONOMIQUE (le plus rare)\nIndicateurs d'efficacité des traitements (HUS)\nPilotage capacitaire / RH : dashboards de charge de travail (Erasmus)\nRéduction des coûts par diagnostic/traitement plus efficient (HUS eCare for Me)\nAnalyse du coût des parcours (HDR UK, projet coût du parcours cancer)", "entretiens": "Le pilotage médico-économique des CHU adossé aux EDS relève davantage d'axe prospectif que de pratiques actuelles et effectives, à l'exception du CHUGA qui y travaille déjà à patrtir de sa base de données créée en 2019.\nIl n'en est pas moins un axe identifié et attendu par les CHU (notamment au sein des DIM), et certains se sont déjà renforcés en conséquence (Cf.recrutement de 2 médico-économistes au CHUCF).\nPour d'autres la difficulté de développer durablement ce volet est associée au modèle court-termiste des financements de poste adossés à certains appels à projets sur le sujet.", "litterature": "APPUI FORT - Maladies chroniques = 62 % des dépenses AM (104 Md€) pour 36 % des assurés ; santé mentale + cancers + cardiovasculaire = 36 % des dépenses à elles seules [Inst. CNAM 2022-2024].\nvers Justifie des tableaux de bord médico-économiques croisés soins primaires / hôpital - dimension jugée secondaire ou sous-dotée en entretiens (E13, E16, E21).", "enquete": ""}}, {"col": "I", "theme": "Structuration des parcours, qualité & prévention", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Cas d'usage 3 - PARCOURS / QUALITÉ / PRÉVENTION / SOIN (en croissance)\nAide à la décision clinique intégrée au workflow (Charité Digi-POD, MII POLAR_MI)\nDétection précoce / dépistage par IA (Mayo Anumana ECG, Sheba, Erasmus)\nPrévention et santé des populations (HDR UK PHM, HUS eMOM diabète gestationnel)\nOptimisation des parcours et des flux hospitaliers (HDR UK IPACS, Erasmus ICU 2.0)\nSécurité du patient / qualité des soins (Sheba Medinsight.ai)\nTélésuivi / soins à domicile / hôpital virtuel (HUS dialyse à domicile, Sheba, Erasmus post-réa)\nMédecine de précision / oncologie moléculaire (Charité Molecular Tumor Board, Sheba)\nCommunication patient (Erasmus, simplification de comptes-rendus par LLM)", "entretiens": "Axe plus spécifiquement porté et promu par les PUPH ayant une double affiliation biostatistique et santé publique.\nRecouvre des cas d'usages variés pour lesquels les pratiques et solutions actuelles seraient \"augmentées\" par la masse de données des EDS, par ex. la prévention et le repérage des personnes à risque, la gestion des crises pandémiques et l'identification des clusters ou encore la gestion des lits disponibles aux urgences.\nAxe qui prend une importance particulière à l'heure du \"virage\" populationnelle et écosystémique de la santé publique (responsabilité populationnelle, approche Une Seule Santé).", "litterature": "APPUI FORT : Fragmentation des parcours [PR Bajeux et al. 2021] ; intégration sanitaire-sociale insuffisante [PR Gautier & Josseran, IJHPM 2024] ; fort potentiel préventif (vaccination, dépistages).\nvers Conforte les pistes prévention de E14, E15, E17, E21 et l'enjeu des parcours gériatriques. Modèles prédictifs d'entrée en dépendance = levier de planification territoriale AuRA.", "enquete": "Angle mort clinique : l'IA actuelle n'a PAS d'impact perçu sur la relation patient / la coordination - 38,2 % « aucun impact », 6,9 % « impact perçu », 54,9 % ne se prononcent pas. L'usage reste péri-clinique (documentaire). Le terrain parcours / qualité / prévention est une zone à investir (Conviction 9)."}}, {"col": "J", "theme": "Autres usages", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Cas d'usage 4 : AUTRES USAGES\nRéponse aux demandes des autorités (HUS)\nMise à disposition de l'industrie / valorisation (Mayo Orchestrate, HUS Acamedic, Sheba)\nFormation / enseignement (Erasmus)\nKnowledge-based management : reporting régional, base de connaissance (HUS)", "entretiens": "L'intérêt des EDS comme outils à portée pédagogique est souligné à deux niveaux:\n1. Pour sensibiliser les internes à l'importance du travail de préparation / structuration des bases de données en amont des travaux de recherche ; 2. Pour aider les futurs praticiens à se projeter dans la diversité des cas d'usage de la data\nA mi-chemin entre les volets recherche et qualité, l'usage des EDS à des fin d'évaluation des DM est également mentionné via l'accès à des données en vie réelle complémentaires des approches mixtes qualitatives/quantitatives conduites aujourd'hui.", "litterature": "APPUI : - Surveillance épidémiologique en temps quasi-réel et alerte précoce (RAM, émergences infectieuses) : usage à fort potentiel, quasi-absent des EDS français existants,\n--> Étend le champ au-delà de la recherche clinique vers la veille sanitaire territoriale (rejoint E16 « épidémiologie en temps réel », E21 « micro-épidémiologie locale »).\n--> Demande une interop des infra et une capacité de suiivi longitudinal (objectif à moyen/ long terme)", "enquete": "Usage individuel = productivité documentaire, à faible barrière d'entrée : rédaction (comptes rendus, courriers) 24,1 % ; recherche d'information / synthèse 24,1 % ; création de présentations 12,6 % ; traduction 11,0 %. Bénéfice n°1 : gain de temps (41,7 %) - le message le plus fédérateur. Pratique installée : >60 % d'usage régulier (quotidien / hebdomadaire)."}}, {"col": "K", "theme": "Points de vigilance et freins actuels, et réticence", "bloc": "Etat des lieux EDS et usages actuels", "weak": false, "flux": {"benchmark": "Freins / point de vigilance très fréquents :\n- Qualité et hétérogénéité des données (toutes les structures)\nFreins fréquents\n- Gouvernance de l'accès à la donnée\n- Soutenabilité économique après l'amorçage\n- Charge de l'harmonisation des données\nFreins moyennement fréquents :\n- Adoption lente par les chercheurs et cliniciens\n- Dépendances aux financements / modèle commercial\n- Difficulté de mise à l'échelle / d'intégration dans les pratiques réelle, au delà des pilotes\nFreins moins fréquents :\n- Silos des données et responsabilités floues\n- Dérive des modèles d'IA après déploiement\nFreins spécifiques à certains contexte :\n- Receuil du consentement à grande échelle", "entretiens": "Les points de vigilance relevés concernent à la fois des réalités actuelles que des perceptions prégnantes face à la concrétisation des projets d'EDS.\nConstats actuels:\n- Une acculturation insuffisante aux EDS et leur cadre de fonctionnement => besoin de sortir de la perception trompeuse des EDS comme portails d'accès direct et inconditionnel à des bases de données de santé massives;\n- des temps de réponse jugé trop longs pour aujourd'hui pour évaluer la faisabilité des études en phase de pre-screening.\nCraintes:\n- Sentiment de \"dépossession\" exprimé de la part de certaines équipes cliniques ayant structuré des bases de données très spécifiques dont elles craignent que l'ouverture invisibilise leur contribution.\n- Crainte que les EDS crée un \"appel d'air\" et suscite des demandes supérieures aux ressources humaines pour les traiter.", "litterature": "MÉTHODO :\n• biais de disponibilité : les pathologies bien documentées captent l'attention au détriment de la santé mentale, sous-représentée\n• corrélation ≠ causalité : la hausse de prévalence ALD est d'abord tirée par le vieillissement, pas les seuls modes de vie [Inst. CNAM ; PR Gautier & Josseran 2024]\n• lien RAM-climat documenté mais à manier avec prudence [PR Fernandez Salgueiro 2024]\n• données intra-régionales AuRA quasi absentes de la littérature peer-reviewed.", "enquete": "Les freins sont humains et organisationnels, non techniques (triangule les entretiens « acculturation » + Health Data Research UK « le verrou est la gouvernance »). Trois freins dominants : craintes éthiques / juridiques 51,5 % (1er, surtout soignants) ; manque de connaissances 50,1 % (surtout +56 ans) ; manque de confiance / fiabilité 39,9 % (surtout 18-25 ans). Nuance : 429 répondants déclarent n'avoir aucun frein."}}, {"col": "L", "theme": "Autres idées / commentaires", "bloc": "Etat des lieux EDS et usages actuels", "weak": true, "flux": {"benchmark": "", "entretiens": "", "litterature": "MÉTHODE - Mapping Review asymétrique [Arksey & O'Malley 2005 ; Levac et al. 2010] + revue narrative ciblée [Saracci et al., Rev Med Suisse 2019]. Corpus peer-reviewed prioritaire.\nvers Garantit reproductibilité (équations, critères d'inclusion/exclusion) et cartographie explicite des angles morts.", "enquete": "RÉSERVE MÉTHODOLOGIQUE - taux de non-réponse très élevés sur plusieurs items : charte IA 90,9 % non renseigné ; impact patient 54,9 % ; technologie des projets ~73 %. Sur ces items, les « oui / non » ne sont pas des proportions de la population mais des déclarations minoritaires sur base incomplète vers à lire comme signal, jamais comme mesure. Données déclaratives = à trianguler, pas à isoler."}}, {"col": "M", "theme": "Intérêt EDS interopérables au sein du GCS", "bloc": "Projection a 10 ans", "weak": false, "flux": {"benchmark": "", "entretiens": "Structuration perçue par tous les répondants comme un véritable levier distinctif représentant à la fois une nouvelle étape pour faire \"plus\" et \"mieux\" qu'aujourd'hui, et dans le même temps un pré-requis pour initier de nouvelles pratiques à l'échelle régionale.\nNouvelle étape:\n- L'interopérabilité by design favorise le partage d'expérience entre CHU dès la phase de mise en oeuvre et de structuration;\n- Renforce un partenariat déjà existant entre les 4 CHU;\n- Permet d'élargir et de varier les échelles d'analyse pour la recherche.\n- L'échelon régional peut servir de preuve de concept pour aller plus loin sur certains aspects dans l'approche fédérée (\"si ça fonctionne à 4, pourquoi pas à 32 demain ?\").\nNouvelles pratiques:\n- pré-requis pour une nouvelle politique de Santé Publique et épidémiologique à l'échelle régionale;\n- EDS identiques ne signifie pas automatiquement \"interconnectés\" => besoin de structurer des process et de partager des indicateurs pour répondre aux enjeux de recherche et de santé publique.", "litterature": "- Les enjeux RAM et épidémiologiques ne prennent leur puissance qu'à une échelle agrégée ; les cohortes de taille suffisante (vieillissement, maladies rares, ALD) supposent des données multi-CHU.\nvers Valide l'intérêt de l'interopérabilité exprimé unanimement (E12, E13, E15, E18, E20, E21 ; E15 : « ce qui n'a de sens qu'à l'échelle régionale »).", "enquete": ""}}, {"col": "N", "theme": "Evolutions attendues à horizon 10 ans", "bloc": "Projection a 10 ans", "weak": false, "flux": {"benchmark": "", "entretiens": "Les évolutions attendues et souhaitées sont nombreuses mais peuvent être regroupées en trois dimensions:\nLe développement de nouvelles pratiques\n- suivi des parcours patient en temps réel (data visualisation des flux)\n- jumeaux numériques\n- développement des aides à la décision par IA\n- Fournir aux pouvoirs publics des retours objectifs sur l'impact sanitaire de leurs politiques et orientations (urbanisme, travaux, végétalisation...)\nL'articulation des bases de données et la facilitation de leur accès\n- chaînage des EDS avec le SNDS / le DPI\n- intégration des données diverses (biologie, génétique...) sur un modèle \"guichet unique\"\n- développement de solutions ergonomiques de pre-screening\n- alimentation des EDS directement par les patients (auto-monitoring)\n- développer le suivi à distance (remote monitoring) et l'intégrer aux EDS\nLe renforcement des organisations existantes et l'évolution des métiers\n- réaliser des études de plus grande envergure\n- développer le suivi des parcours en créant des équipes externes aux CHU en charge du traitement croisé et de l'analyse des données Ville/Hôpital\n- développer la prévention et la détection précoce des personnes à risques\n- réaffecter les ressources humaines sur d'autres fonctions que la saisie des données (Cf.ARC) en la facilitant via des outils dédiés", "litterature": "CADRE QUANTITATIF DES BESOINS :\n• 60+ ans : 28 % (2025) vers 35 % (2070) [Inst. INSEE]\n• personnes dépendantes : +50 % de 2015 à 2045 (≈900 000) ; 4 M de seniors en perte d'autonomie d'ici 2050 [Inst. INSEE Première n°1767, 2019]\n• prévalence ALD : 14,6 % (2008) vers 17,8 % (2021), +22 % [Inst. CNAM]\n• RAM : jusqu'à 10 M décès/an en 2050 [PR EMR 2024]\nvers À mettre en regard des projections d'usage des entretiens.", "enquete": ""}}, {"col": "O", "theme": "Clés de réussite identifiées", "bloc": "Projection a 10 ans", "weak": false, "flux": {"benchmark": "", "entretiens": "5 leviers prioritaires mentionnés:\n- l'acculturation: concerne à la fois la réutilisation secondaire des données de santé via les EDS que les potentialités de l'IA et ses limites ; passe par la formation des internes mais aussi par la banalisation du recours au EDS dans les pratiques professionnelles;\n- la simplification de l'accès aux données, des outils de pre-screening ou encore des procédures de rétroaction sur la saisie des données;\n- la mutualisation, au-delà des équipements, pourrait concerner les codes, les méthodes, les indicateurs, les bonnes pratiques (...) mais aussi l'instauration d'une comitologie régionale pour définir un cadre de réponse partagé aux sollicitaions des acteurs privés offreurs de solutions\n- la conformité, notamment au cadre RGPD;\n- les ressources humaines dédiées, avec la perspective d'une équipe technique EDS support mutualisée à l'échelle du GCS.", "litterature": "- Prévention renforcée, modèles intégrés, données longitudinales multi-acteurs [PR Rechel et al., Lancet 2013] ; croisement DPI × données médico-sociales × SNDS.\nvers Convergent avec les clés de réussite des entretiens (gouvernance, acculturation, équipe technique mutualisée) en y ajoutant l'exigence d'ancrage santé publique.", "enquete": "Besoins d'accompagnement exprimés (= clés de réussite côté terrain) : sensibilisation générale à l'IA en santé 57,6 % ; cadre RGPD / CNIL / IA Act / HAS clarifié 35,9 % ; montage de projets (business case, cahier des charges) ~30-35 %. Appétence ascendante forte : 63,1 % prêts à participer à une instance IA (Saint-Étienne en tête, 71,4 %) vers un mandat de gouvernance « bottom-up » est disponible."}}, {"col": "P", "theme": "Points de vigilance / évolutions", "bloc": "Projection a 10 ans", "weak": false, "flux": {"benchmark": "", "entretiens": "- Si la recherche est un moteur central de l'appropriation des EDS et de la structuration des bases de données, il ne faut pas oublier les autres axes d'usage pour que ces outils trouvent toute leur place et soient pérennes;\n- Il faut travailler l'attractivité des EDS et des travaux et métiers d'analyse de la donnée de santé qui peuvent encore être perçus comme secondaire ou détachés vis-à-vis du soin;\n- la souveraineté des solutions est un point d'attention partagé;\n- la crainte d'une prolifération d'interfaces distinctes d'accès / d'interrogation des bases de données est exprimée.", "litterature": "VIGILANCES STRATÉGIQUES :\n• sous-estimation persistante de la RAM dans les plans nationaux à 10 ans [PR EMR 2024]\n• absence de preuve robuste sur le ROI des EDS partagés (cf. col. F)\n• risque de surinterprétation causale des associations épidémiologiques.\nvers À porter explicitement dans la stratégie 15 ans comme exigences de méthode.", "enquete": "Chantier prioritaire = filière soignante (usage 40,2 % vs 50-55 % pour les autres filières) et +56 ans (faible maturité, 14,2 % sans frein). Vigilance : disposer d'une instance IA ne suffit pas - la gouvernance doit se rendre visible et pédagogique pour être perçue par le terrain."}}, {"col": "Q", "theme": "Autres remarques / commentaires", "bloc": "Projection a 10 ans", "weak": true, "flux": {"benchmark": "", "entretiens": "", "litterature": "Au niveau de la littérature française intra-régionale AuRA est quasi inexistante.\nvers Produire cette donnée est en soi une contribution scientifique différenciante pour HOURAA.", "enquete": ""}}, {"col": "R", "theme": "Usages et actuels", "bloc": "IA : pratiques et enjeux", "weak": false, "flux": {"benchmark": "1 - IA clinique d'aide à la décision & diagnostic\nDétection/diagnostic sur imagerie et signal (Sheba AI Head Analysis sur CT, Mayo/Anumana ECG)\nAide à la décision intégrée au workflow (MII POLAR_MI sur risques médicamenteux, Charité Digi-POD delirium)\nMédecine de précision / oncologie moléculaire (Charité Molecular Tumor Board, Sheba/Google oncologie ovarienne)\nGénomique par IA / LLM (Sheba-Mount Sinai-NVIDIA)\n2 - IA prédictive & populationnelle\nModèles de risque et de prédiction individualisés (Erasmus, HUS eMOM diabète gestationnel)\nDétection précoce de maladies « silencieuses » (Mayo : fraction d'éjection basse, hypertension pulmonaire, amylose ; Erasmus : prédiction post-chirurgie)\nPrédiction de détérioration / d'événements (Erasmus ICU 2.0, MII)\nSanté des populations / prévention par IA (HDR UK PHM, HUS)\nSécurité patient / détection d'événements indésirables (Sheba Medinsight.ai : 95 % précision, 6× plus de détections)\nC - IA opérationnelle / pilotage\nAutomatisation des tâches / réduction de la charge (Sheba Project K, urgences IA)\nOptimisation des flux et des parcours (Erasmus dashboards, HDR UK IPACS)\nD - IA générative & agents (la vague la plus récente)\nAgents d'IA générative pour la délivrance de soins (Sheba/Hippocratic AI)\nLLM pour la communication patient (Erasmus : simplification de comptes-rendus)\nIA générative pour la qualité/sécurité (Sheba Medinsight.ai)\nTransversal - la méthode de production de l'IA\nML fédéré / apprentissage sans déplacer les données (MII PrivateAIM, Mayo Data Behind Glass, Connect)\nGrands enseignements\n1. Les cas d'usage les plus répendus avec une valeur clinique prouvée et lisible sont : la détection précoce et les outils d'aide à la décision .\n2. Pour modèle multi-établissement fédéré (les données ne sont pas centralisées mais chaque établissement est détenteur de ses propres données), le ML fédéré permet d'entrainer les modèles sans déplacer les données\n3. L'intégration dans les pratiques réelles est clé : les usage IA doivent être sélectionnés sur la performance technique MAIS également sur leur intérêt et intégrabilité dans les pratiques de soins\n4. L'accès à des données multimodales conditionne(génomique, imagerie,etc.) les usages IA les plus avancés.", "entretiens": "Période marquée par un foisonnement des outils IA et des usages à trois niveaux:\n- Les usages adossés aux outils IA généralistes (Chat GPT, Gemini...) se développent au sein des équipes support et cliniques pour une grande diversité de besoins: pseudonymisation, rédaction de protocoles, plannings d'équipe, transcription, codage, etc.\n- Les usages d'IA spécialisées se développent au gré des projets expérimentaux et acquisitions de licences: aide à l'analyse en imagerie, gestion des lits, épidémiologie, bras synthétiques / jumeaux numériques...\n- Les projets portés par les cliniciens eux-mêmes prolifèrent au sein des CHU, notamment au niveau des Large Language Models (LLM).", "litterature": "ANGLE MORT\n- Rares méta-analyses sur l'efficacité de modèles IA entraînés sur données EDS multi-CHU (synthèse de la revue, p.7).\nvers La littérature ne valide pas encore les usages IA « foisonnants » décrits en entretiens (E13, E18, E20) ; appelle à l'évaluation avant généralisation.", "enquete": "Taux d'usage IA : 46,1 % (1 160 / 2 505). Domination massive de l'IA générative : ChatGPT 33,6 % (846 mentions, ~3,5× Copilot), Copilot 13,6 %, Gemini, Mistral 10,4 %, Claude 6,7 %. Les outils analytiques ou cliniques spécialisés restent marginaux. Variations locales : Mistral fort aux HCL (14,3 %), Claude à Clermont-Ferrand (9,4 %), Perplexity à Saint-Étienne (8,0 %)."}}, {"col": "S", "theme": "Mesures en place et bonnes pratiques", "bloc": "IA : pratiques et enjeux", "weak": false, "flux": {"benchmark": "", "entretiens": "Comitologie et groupes de travail en place dans les 4 CHU avec des déclinaisons spécifiques: direction IA et stratégie IA formalisée aux HCL, COPIL IA et webinaires dédiés au CHUCF, comitologie autour des EDS et structuration en cours sur les sujets IA au CHUGA et CHUSE.", "litterature": "FAIBLEMENT COUVERT par une revue de santé publique (dimension organisationnelle/IA = entretiens & benchmark).\nvers La littérature plaide pour des protocoles d'évaluation des modèles IA sur données réelles préalables au déploiement (cohérent avec E14, E21).", "enquete": "Cadrage institutionnel quasi absent vers « IA de l'ombre » (shadow AI). Charte IA connue de 7,6 % seulement (90,9 % non renseigné). Accès surtout via licence personnelle gratuite (18,7 %) ; licence fournie par le CHU : 3,4 %. L'usage précède et déborde le cadre institutionnel."}}, {"col": "T", "theme": "Risques identifiés", "bloc": "IA : pratiques et enjeux", "weak": false, "flux": {"benchmark": "", "entretiens": "- Risque de développement des usages d'IA non certifiées et non souveraines si les solutions dédiées prennent trop de retard vis-à-vis de la concurrence (notamment des solutions US).;\n- Ne pas déployer les solutions en vogue sans les évaluer dans le contexte hospitalier spécifique;\n- Eviter d'aller trop vite vers les solutions \"gadgets\" en replaçant les usages au centre des concertations.\n- Risque de perdre de vue les impacts écologiques importants de ses solutions qui nécessitent d'avoir une approche frugale de leurs usages.", "litterature": "RISQUES DOCUMENTÉS - Faible généralisabilité des modèles entraînés sur DPI mono-sites ; hétérogénéité des résultats ; risque d'automatiser des biais.\nLes modèles prédictifs (entrée en dépendance, aggravation, RAM) sont prometteurs mais à valider.\nvers Appuie les craintes d'évaluation exprimées par E14 et E21.", "enquete": "Risques induits par l'usage actuel : données (potentiellement patients) traitées sur des outils grand public hors cadre CNIL / RGPD ; hallucinations et fiabilité non validées cliniquement ; responsabilité médicale non tranchée ; dépendance à des IA non certifiées / non souveraines. Le risque n'est pas l'absence d'IA, mais son usage non maîtrisé."}}, {"col": "U", "theme": "Autres idées / commentaires", "bloc": "IA : pratiques et enjeux", "weak": true, "flux": {"benchmark": "", "entretiens": "", "litterature": "Besoin d'IA évaluée et frugale (rejoint E21) : la valeur clinique réelle prime sur la performance affichée. L'évaluation indépendante des outils reste un angle peu couvert dans la littérature.", "enquete": "Base d'innovation réelle mais fragmentée : 102 projets IA recensés (61 en développement, 29 commercialisés) ; seulement 3,5 % des répondants impliqués. 58 % des projets portés SANS implication institutionnelle déclarée. Porteurs = profils séniors 46-55 ans (41 %), à l'inverse de l'usage individuel plutôt jeune. Domaines : recherche, innovation médicale, soins, aide à la décision."}}];

// ---- geometry ----
const CX=380, CY=380, R0=122, RW=41, GAP=1.4;
const N=DATA.length, STEP=360/N;
const active = {benchmark:true,litterature:true,entretiens:true,enquete:true};
let selIdx=0, selFlux=null;

function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function sector(r1,r2,a1,a2){
  const[x1,y1]=polar(CX,CY,r2,a1),[x2,y2]=polar(CX,CY,r2,a2);
  const[x3,y3]=polar(CX,CY,r1,a2),[x4,y4]=polar(CX,CY,r1,a1);
  const large=(a2-a1)>180?1:0;
  return `M${x1} ${y1} A${r2} ${r2} 0 ${large} 1 ${x2} ${y2} L${x3} ${y3} A${r1} ${r1} 0 ${large} 0 ${x4} ${y4} Z`;
}
function arc(r,a1,a2){const[x1,y1]=polar(CX,CY,r,a1),[x2,y2]=polar(CX,CY,r,a2);const large=(a2-a1)>180?1:0;return `M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2}`;}

const BLOCS=[
 {name:"Etat des lieux EDS & usages actuels",test:d=>d.bloc.startsWith("Etat")},
 {name:"Projection a 10 ans",test:d=>d.bloc.startsWith("Projection")},
 {name:"IA : pratiques & enjeux",test:d=>d.bloc.startsWith("IA")},
];

function build(){
  const svg=document.getElementById('wheel');let s='';
  // block arcs
  BLOCS.forEach((b,bi)=>{
    const idxs=DATA.map((d,i)=>b.test(d)?i:-1).filter(i=>i>=0);
    if(!idxs.length)return;
    const a1=idxs[0]*STEP+GAP, a2=(idxs[idxs.length-1]+1)*STEP-GAP;
    const col=[ '#d9772f','#5a6bd8','#3f7d7d'][bi];
    s+=`<path class="blocarc" d="${arc(R0+4*RW+16,a1,a2)}" stroke="${col}"/>`;
    const mid=(a1+a2)/2, [tx,ty]=polar(CX,CY,R0+4*RW+30,mid);
    const rot = mid>180 ? mid+90 : mid-90;
    s+=`<text class="bloclbl" x="${tx}" y="${ty}" text-anchor="middle" transform="rotate(${rot} ${tx} ${ty})">${b.name}</text>`;
  });
  // cells
  DATA.forEach((d,i)=>{
    const a1=i*STEP+GAP/2, a2=(i+1)*STEP-GAP/2;
    ORDER.forEach((f,ri)=>{
      const r1=R0+ri*RW, r2=r1+RW-2;
      const has=!!d.flux[f];
      const fill = has?FLUX[f].bg:"transparent";
      const cls = has?"cell":"cell empty";
      const op = d.weak && has ? 0.4 : 1;
      s+=`<path class="${cls}" data-i="${i}" data-f="${f}" d="${sector(r1,r2,a1,a2)}" fill="${fill}" style="opacity:${op}" ${has?`stroke="${FLUX[f].accent}" stroke-opacity=".25"`:`stroke="${'#e2ded4'}" stroke-opacity=".5" stroke-dasharray="2 2"`}/>`;
    });
    // hit area (full radial) for selecting the theme
    s+=`<path class="seg-hit" data-i="${i}" d="${sector(R0,R0+4*RW,a1,a2)}"/>`;
    // label
    const mid=(a1+a2)/2, lr=R0+4*RW+12, [lx,ly]=polar(CX,CY,lr,mid);
    let rot=mid>180?mid+90:mid-90; const anchor=mid>180?"end":"start";
    const wcls=d.weak?"lbl weak":"lbl";
    s+=`<text class="${wcls}" id="lbl${i}" x="${lx}" y="${ly}" text-anchor="${anchor}" transform="rotate(${rot} ${lx} ${ly})">${d.theme}</text>`;
  });
  // center
  s+=`<circle cx="${CX}" cy="${CY}" r="${R0-6}" fill="#faf9f6" stroke="#e2ded4"/>`;
  s+=`<text id="ctitle" class="center-t" x="${CX}" y="${CY-4}" text-anchor="middle" font-size="15">Analyse</text>`;
  s+=`<text id="csub" class="center-s" x="${CX}" y="${CY+16}" text-anchor="middle">croisee D2H</text>`;
  svg.innerHTML=s;
  svg.querySelectorAll('.seg-hit').forEach(el=>el.addEventListener('click',()=>select(+el.dataset.i,null)));
  svg.querySelectorAll('.cell').forEach(el=>{ if(el.classList.contains('empty'))return;
    el.addEventListener('click',e=>{e.stopPropagation();select(+el.dataset.i,el.dataset.f);});});
}

function buildLegend(){
  const L=document.getElementById('legend');
  L.innerHTML=ORDER.map(f=>`<span data-f="${f}"><i style="background:${FLUX[f].bg};border:1px solid ${FLUX[f].accent}"></i>${FLUX[f].label}</span>`).join('');
  L.querySelectorAll('span').forEach(sp=>sp.addEventListener('click',()=>{
    const f=sp.dataset.f; active[f]=!active[f]; sp.classList.toggle('off',!active[f]);
    document.querySelectorAll(`.cell[data-f="${f}"]`).forEach(c=>c.style.display=active[f]?'':'none');
  }));
}

function wrapText(t,max){ // for center title
  return t.length>max? t.slice(0,max) : t;
}

function select(i,flux){
  selIdx=i; selFlux=flux;
  DATA.forEach((d,k)=>{const l=document.getElementById('lbl'+k);if(l)l.classList.toggle('sel',k===i);});
  const d=DATA[i];
  document.getElementById('ctitle').textContent = d.col;
  const csub=document.getElementById('csub');
  csub.textContent = d.theme.length>22? d.theme.slice(0,20)+'..' : d.theme;
  renderPanel();
}

function renderPanel(){
  const d=DATA[selIdx];const p=document.getElementById('panel');
  const avail=ORDER.filter(f=>d.flux[f]);
  let shown = selFlux? [selFlux] : ORDER.filter(f=>chipOn[f] && d.flux[f]);
  if(selFlux) { ORDER.forEach(f=>chipOn[f]=(f===selFlux)); }
  let html=`<div class="nav">
     <a class="mut" onclick="step(-1)">&larr; Precedent</a>
     <a class="mut" onclick="resetFlux()">Tous les flux</a>
     <a onclick="step(1)">Suivant &rarr;</a></div>`;
  html+=`<div class="p-bloc">${d.bloc}${d.weak?' &middot; colonne annexe (fourre-tout)':''}</div>`;
  html+=`<div class="p-title">${d.theme}</div>`;
  html+=`<div class="chips">`+ORDER.map(f=>{
    const has=!!d.flux[f]; const on=chipOn[f]&&has;
    const cls = !has?'chip disabled':(on?'chip':'chip off');
    const style=`background:${FLUX[f].bg};color:${FLUX[f].accent};`;
    return `<span class="${cls}" style="${style}" onclick="${has?`toggleChip('${f}')`:''}">${FLUX[f].label}</span>`;
  }).join('')+`</div>`;

  const list = ORDER.filter(f=>chipOn[f] && d.flux[f]);
  if(!list.length){
    html+=`<div class="empty-note">Aucun flux selectionne, ou ce sous-theme n'est documente par aucun flux actif.</div>`;
  }
  list.forEach(f=>{
    html+=`<div class="block" style="border-color:${FLUX[f].accent}">
      <div class="src" style="color:${FLUX[f].accent}">${FLUX[f].label}
        <span class="lvl">${FLUX[f].lvl}</span></div>
      <div class="txt">${escapeHtml(d.flux[f])}</div></div>`;
  });
  // silence note
  const silent=ORDER.filter(f=>!d.flux[f]);
  if(silent.length){
    html+=`<div class="contrib">Silence sur ce sous-theme : ${silent.map(f=>FLUX[f].label).join(', ')}. `+
      `Une case creuse dans la roue = ce flux n'en parle pas (information, pas oubli).</div>`;
  }
  p.innerHTML=html;
}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const chipOn={benchmark:true,litterature:true,entretiens:true,enquete:true};
function toggleChip(f){chipOn[f]=!chipOn[f];selFlux=null;renderPanel();}
function resetFlux(){ORDER.forEach(f=>chipOn[f]=true);selFlux=null;renderPanel();}
function step(dir){let i=(selIdx+dir+DATA.length)%DATA.length;select(i,null);}

build();buildLegend();select(0,null);
</script>
</body>
</html>
